<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Rounded background -->
  <rect width="32" height="32" rx="7" fill="#3b5bdb"/>

  <!-- Graduation cap mortarboard top (diamond) -->
  <polygon points="16,5 29,11 16,17 3,11" fill="white"/>

  <!-- Cap highlight (subtle top shine) -->
  <polygon points="16,5 29,11 22.5,11 16,8" fill="white" opacity="0.3"/>

  <!-- Cap base / body beneath the board -->
  <path d="M11.5 14.5 L11.5 20 Q11.5 22 16 22 Q20.5 22 20.5 20 L20.5 14.5" fill="none" stroke="white" stroke-width="2.2" stroke-linejoin="round"/>

  <!-- Tassel cord hanging from right corner -->
  <line x1="29" y1="11" x2="29" y2="19" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.9"/>
  <!-- Tassel knot -->
  <circle cx="29" cy="20.5" r="1.8" fill="#f1c40f"/>
  <!-- Tassel strands -->
  <line x1="28" y1="22" x2="27" y2="26" stroke="#f1c40f" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="29" y1="22.2" x2="29" y2="26.5" stroke="#f1c40f" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="30" y1="22" x2="31" y2="26" stroke="#f1c40f" stroke-width="1.4" stroke-linecap="round"/>
</svg>
